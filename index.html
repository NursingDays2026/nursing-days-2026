<!DOCTYPE html>
<html>
<head>
    <title>Hogwarts Sorting Ceremony</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
        }
        h1 {
            margin: 0;
        }
        .sorting-hat {
            margin: 40px 0;
            padding: 20px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #35424a;
            color: #ffffff;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border: 2px solid #4caf50;
            border-radius: 5px;
            display: none;
            font-size: 16px;
            color: #2e7d32;
        }
        .result.show {
            display: block;
            animation: slideIn 0.5s ease-in;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Hogwarts Sorting Ceremony</h1>
    </header>
    <div class="container">
        <div class="sorting-hat">
            <h2>Enter Your Name to be Sorted</h2>
            <input type="text" id="studentName" placeholder="Your Name" />
            <button onclick="startSorting()">Sort Me!</button>
            <div id="result" class="result"></div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Hogwarts Sorting Ceremony</p>
    </footer>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/d/AKfycbwDLb4itqneeeT-TOtO93NM_0iLIOB52zyjEoX9DI6ycr8RpwuELDbxUE3IUWM5DAexng/userweb_app";

        function sortStudent(studentName) {
            const houses = ['Gryffindor', 'Hufflepuff', 'Ravenclaw', 'Slytherin'];
            const randomIndex = Math.floor(Math.random() * houses.length);
            const assignedHouse = houses[randomIndex];
            
            sendToGoogleSheet(studentName, assignedHouse);
            showResult(studentName, assignedHouse);
        }

        function sendToGoogleSheet(studentName, assignedHouse) {
            const data = {
                studentName: studentName,
                assignedHouse: assignedHouse,
                timestamp: new Date().toLocaleString()
            };

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data),
                mode: 'no-cors'
            })
            .then(response => console.log('Data sent successfully'))
            .catch(error => console.error('Error:', error));
        }

        function showResult(studentName, assignedHouse) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<strong>${studentName}, you have been sorted into ${assignedHouse}!</strong><p style="margin-top: 10px; font-size: 14px;">✓ Result submitted to spreadsheet</p>`;
            resultDiv.classList.remove('show');
            setTimeout(function() {
                resultDiv.classList.add('show');
            }, 10);
        }

        function startSorting() {
            const studentName = document.getElementById('studentName').value.trim();
            if (studentName) {
                sortStudent(studentName);
                document.getElementById('studentName').value = '';
            } else {
                alert('Please enter your name before sorting.');
            }
        }

        document.getElementById('studentName').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                startSorting();
            }
        });
    </script>
</body>
</html>
