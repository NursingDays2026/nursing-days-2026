<!-- Google Sheets Integration -->
<script>
  function sendResultsToSheet(data) {
    const sheetId = 'YOUR_SHEET_ID';
    const sheetName = 'Results';
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${sheetName}!A1:append?valueInputOption=RAW&key=YOUR_API_KEY`;
    const params = {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        values: [data],
      }),
    };

    fetch(url, params)
      .then(response => response.json())
      .then(data => console.log('Success:', data))
      .catch((error) => console.error('Error:', error));
  }

  // Example usage
  // sendResultsToSheet(['Sorting Result', 'Example']);
</script>
